    const cards = document.querySelectorAll('.card');
    const dots = document.querySelectorAll('.dot');
    const panelTitle = document.getElementById('panel-title');
    const panelCopy = document.getElementById('panel-copy');
    const panelCast = document.getElementById('panel-cast');
    const panelLinks = document.getElementById('panel-links');

    let currentIndex = 0;

    function renderCast(cast) {
      if (!cast) { panelCast.innerHTML = ''; return; }
      const label = `<span class="cast-label">${cast.label}</span>`;
      const names = cast.names.map(n =>
        n.href ? `<a href="${n.href}">${n.name}</a>` : n.name
      ).join(', ');
      panelCast.innerHTML = label + names;
    }

    function renderLinks(links) {
      panelLinks.innerHTML = '';
      links.forEach(link => {
        const a = document.createElement('a');
        a.className = 'panel-link';
        a.href = link.href;
        a.textContent = link.label;
        panelLinks.appendChild(a);
      });
    }

    function showPanel(index, updateHash = true) {
      cards.forEach(c => { c.classList.remove('visible'); c.classList.add('hidden'); });
      dots.forEach(d => d.classList.remove('active'));
      cards[index].classList.remove('hidden');
      cards[index].classList.add('visible');
      dots[index].classList.add('active');
      panelTitle.textContent = panels[index].title;
      panelCopy.innerHTML = panels[index].copy;
      renderCast(panels[index].cast);
      renderLinks(panels[index].links);
      currentIndex = index;
      if (updateHash) history.replaceState(null, '', '#' + panels[index].id);
    }

    function showNextPanel() {
      showPanel((currentIndex + 1) % panels.length);
    }

    dots.forEach((dot, i) => dot.addEventListener('click', () => showPanel(i)));
    cards.forEach(card => {
      card.addEventListener('click', showNextPanel);
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showNextPanel(); }
      });
    });

    function loadFromHash() {
      const requested = window.location.hash.replace('#', '');
      const index = panels.findIndex(p => p.id === requested);
      showPanel(index >= 0 ? index : 0, false);
    }

    window.addEventListener('hashchange', loadFromHash);
    loadFromHash();
  </script>
