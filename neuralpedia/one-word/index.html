  <script>
    const panels = [
      {
        id: "overview",
        subtitle: "Overview",
        title: "One Word",
        copy: "[ONEWORDTEXT]",
        links: [
          { label: "Patreon", href: "https://www.patreon.com/minderaser" },
          { label: "MusicBrainz Release Group", href: "https://musicbrainz.org/release-group/61f7a8f1-07e9-4442-b1d0-02018dfc0bae" }
        ]
      },
      {
        id: "please",
        subtitle: "Please",
        title: "One Word: Please",
        copy: "[PLEASETEXT]",
        links: [
          { label: "Patreon", href: "https://www.patreon.com/posts/one-word-please-54105042" },
          { label: "MusicBrainz Release", href: "https://musicbrainz.org/release/3f35c583-dec9-45a8-84e3-2c0e3a1ea62f" }
        ]
      },
      {
        id: "moo",
        subtitle: "Moo",
        title: "One Word: Moo",
        copy: "[MOOTEXT]",
        links: [
          { label: "Patreon", href: "https://www.patreon.com/posts/one-word-moo-mix-57819600" },
          { label: "MusicBrainz Release", href: "https://musicbrainz.org/release/82c13359-b143-4e30-a486-e013ab23b559" }
        ]
      },
      {
        id: "dumb",
        subtitle: "Dumb",
        title: "One Word: Dumb",
        copy: "[DUMBTEXT]",
        links: [
          { label: "Patreon", href: "https://www.patreon.com/posts/one-word-dumb-57383264" },
          { label: "MusicBrainz Release", href: "https://musicbrainz.org/release/4051e3dd-1db6-4d2c-8db6-448b877b7bd0" }
        ]
      },
      {
        id: "pink",
        subtitle: "Pink",
        title: "One Word: Pink",
        copy: "[PINKTEXT]",
        links: [
          { label: "Patreon", href: "https://www.patreon.com/posts/pink-one-word-54639590" },
          { label: "MusicBrainz Release", href: "https://musicbrainz.org/release/996c7d1f-d5f2-43d0-967a-ff1082419b41" }
        ]
      }
    ];

    const cards = document.querySelectorAll('.card');
    const dots = document.querySelectorAll('.dot');
    const prevBtns = document.querySelectorAll('.nav-button.prev');
    const nextBtns = document.querySelectorAll('.nav-button.next');
    const subtitle = document.getElementById('panel-subtitle');
    const panelTitle = document.getElementById('panel-title');
    const panelCopy = document.getElementById('panel-copy');
    const panelLinks = document.getElementById('panel-links');

    let currentIndex = 0;

    function renderLinks(links) {
      panelLinks.innerHTML = '';

      links.forEach(link => {
        const anchor = document.createElement('a');
        anchor.className = 'panel-link';
        anchor.href = link.href;
        anchor.textContent = link.label;
        panelLinks.appendChild(anchor);
      });
    }

    function showPanel(index, updateHash = true) {
      cards.forEach(card => {
        card.classList.remove('visible');
        card.classList.add('hidden');
      });

      dots.forEach(dot => dot.classList.remove('active'));

      cards[index].classList.remove('hidden');
      cards[index].classList.add('visible');

      dots[index].classList.add('active');

      subtitle.textContent = panels[index].subtitle;
      panelTitle.textContent = panels[index].title;
      panelCopy.textContent = panels[index].copy;
      renderLinks(panels[index].links);

      currentIndex = index;

      if (updateHash) {
        history.replaceState(null, '', '#' + panels[index].id);
      }
    }

    prevBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const newIndex = (currentIndex - 1 + cards.length) % cards.length;
        showPanel(newIndex);
      });
    });

    nextBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const newIndex = (currentIndex + 1) % cards.length;
        showPanel(newIndex);
      });
    });

    dots.forEach((dot, index) => {
      dot.addEventListener('click', () => {
        showPanel(index);
      });
    });

    function loadFromHash() {
      const requested = window.location.hash.replace('#', '');
      const index = panels.findIndex(panel => panel.id === requested);

      if (index >= 0) {
        showPanel(index, false);
      } else {
        showPanel(0, false);
      }
    }

    window.addEventListener('hashchange', loadFromHash);
    loadFromHash();
  </script>
</body>
</html>
