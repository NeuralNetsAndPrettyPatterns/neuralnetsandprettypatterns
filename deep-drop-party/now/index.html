  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    :root {
      --bg:          #08060a;
      --surface:     #100e14;
      --surface2:    #18151e;
      --pink:        #ff2d78;
      --pink-glow:   rgba(255,45,120,0.15);
      --pink-subtle: rgba(255,45,120,0.06);
      --text:        #ede8f2;
      --text-dim:    #9488a0;
      --text-muted:  #524858;
      --border:      rgba(255,45,120,0.11);
      --border-hi:   rgba(255,45,120,0.35);
      --mono:        'Space Mono', monospace;
      --display:     'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.75;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
    }

    .header {
      position: sticky; top: 0; z-index: 90;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(8,6,10,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .header-brand { display: flex; align-items: center; gap: 0.7rem; text-decoration: none; }
    .header-logo { width: 30px; height: 30px; object-fit: contain; }
    .header-name { font-family: var(--display); font-weight: 800; font-size: 0.9rem; color: var(--text); letter-spacing: -0.02em; }
    .header-name b { color: var(--pink); }
    .header-nav { display: flex; align-items: center; gap: 1.5rem; }
    .header-nav a { font-size: 0.67rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.18s; }
    .header-nav a:hover, .header-nav a.active { color: var(--pink); }

    .main { max-width: 900px; margin: 0 auto; padding: 3rem 2rem 5rem; }

    .breadcrumb {
      font-size: 0.63rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 2rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; transition: color 0.18s; }
    .breadcrumb a:hover { color: var(--pink); }

    .show-block { margin-bottom: 4rem; padding-bottom: 3rem; border-bottom: 1px solid var(--border); }
    .show-block.previous { opacity: 0.86; }
    .show-block.previous .live-dot { background: var(--text-muted); animation: none; }

    .poster-wrap { float: right; margin: 0 0 2rem 2.5rem; width: 280px; flex-shrink: 0; }
    .poster-wrap img { width: 100%; border-radius: 3px; border: 1px solid var(--border-hi); display: block; }

    .poster-placeholder {
      float: right; margin: 0 0 2rem 2.5rem; width: 280px; min-height: 280px;
      border: 1px solid var(--border-hi); border-radius: 3px;
      background: radial-gradient(circle at 30% 20%, var(--pink-glow), transparent 40%),
                  linear-gradient(135deg, var(--surface), var(--surface2));
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 1.5rem;
      font-family: var(--display); font-weight: 800; font-size: 2.5rem;
      letter-spacing: -0.04em; color: var(--pink);
    }

    .ep-kicker { font-size: 0.63rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--pink); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.6rem; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pink); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    .ep-number { font-family: var(--display); font-weight: 800; font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 0.4rem; }

    h1 { font-family: var(--display); font-weight: 800; font-size: clamp(2.2rem, 6vw, 4rem); letter-spacing: -0.04em; line-height: 0.95; color: var(--text); margin-bottom: 0.3em; }
    h1 span { color: var(--pink); }

    .theme-tag { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin: 1rem 0 1.5rem; }
    .theme-tag b { color: var(--text-dim); font-weight: 400; }

    .description { font-size: 0.95rem; color: var(--text-dim); line-height: 1.85; max-width: 540px; margin-bottom: 2rem; }
    .description p + p { margin-top: 0.75rem; }
    .description a { color: var(--pink); text-decoration: none; border-bottom: 1px solid rgba(255,45,120,0.3); transition: border-color 0.18s; }
    .description a:hover { border-color: var(--pink); }

    .badge-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .badge { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.25rem 0.65rem; border-radius: 2px; font-weight: 700; font-family: var(--mono); }
    .badge-premiere { background: rgba(255,45,120,0.12); color: var(--pink); border: 1px solid var(--border-hi); }
    .badge-haptic   { background: rgba(123,47,255,0.15); color: #a87fff; border: 1px solid rgba(123,47,255,0.3); }
    .badge-free     { background: rgba(100,200,100,0.08); color: #7ec87e; border: 1px solid rgba(100,200,100,0.25); }
    .badge-ama      { background: rgba(255,255,255,0.06); color: var(--text-dim); border: 1px solid var(--border); }

    .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 2.5rem; }
    .info-cell { background: var(--surface); padding: 1rem 1.25rem; }
    .info-label { font-size: 0.58rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.35rem; }
    .info-val { font-family: var(--display); font-weight: 700; font-size: 0.9rem; color: var(--text); }
    .info-val a { color: var(--pink); text-decoration: none; }

    .section-tag { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--pink); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; }
    .section-tag::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .tracklist { border: 1px solid var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 2.5rem; }
    .track { display: flex; align-items: baseline; gap: 0.75rem; padding: 0.7rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--surface); transition: background 0.15s; }
    .track:last-child { border-bottom: none; }
    .track:hover { background: var(--surface2); }
    .track-pos { font-size: 0.6rem; color: var(--text-muted); min-width: 1.5rem; flex-shrink: 0; }
    .track-body { flex: 1; min-width: 0; }
    .track-title { font-family: var(--display); font-weight: 700; font-size: 0.88rem; color: var(--text); margin-bottom: 0.2rem; }
    .track-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .track-link { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; padding: 0.15rem 0.4rem; border: 1px solid var(--border); border-radius: 2px; transition: all 0.15s; }
    .track-link:hover { color: var(--text); border-color: var(--border-hi); }
    .track-link.catalogue { color: var(--pink); border-color: rgba(255,45,120,0.25); }
    .track-link.catalogue:hover { background: var(--pink-subtle); border-color: var(--pink); }
    .track-badges { display: flex; gap: 0.3rem; margin-left: auto; flex-shrink: 0; align-self: center; }

    .cta-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 3rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.45rem; padding: 0.65rem 1.4rem; font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; text-decoration: none; border-radius: 2px; transition: all 0.18s; }
    .btn-primary { background: var(--pink); color: #fff; border: 1px solid var(--pink); }
    .btn-primary:hover { background: transparent; color: var(--pink); }
    .btn-ghost { background: transparent; border: 1px solid var(--border-hi); color: var(--text-dim); }
    .btn-ghost:hover { border-color: var(--pink); color: var(--text); }

    .footer-bar { border-top: 1px solid var(--border); padding: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; max-width: 900px; margin: 0 auto; }
    .footer-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .footer-links a { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.18s; }
    .footer-links a:hover { color: var(--pink); }
    .footer-id { font-size: 0.6rem; color: var(--text-muted); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    .main { animation: fadeUp 0.5s ease both; }

    @media (max-width: 640px) {
      .header-nav { display: none; }
      .poster-wrap, .poster-placeholder { float: none; width: 100%; margin: 0 0 2rem 0; }
      .footer-bar { flex-direction: column; }
    }
  </style>
</head>

  <script src="/show-data.js"></script>
  <script>
    function renderTracklist(tracks) {
      return tracks.map(function(t) {
        var links = t.links.map(function(l) {
          return '<a class="track-link ' + (l.style || '') + '" href="' + l.url + '" target="_blank" rel="noopener">' + l.label + '</a>';
        }).join('');
        var badges = t.badges.map(function(b) {
          return '<span class="badge ' + b.cls + '">' + b.label + '</span>';
        }).join('');
        return '<div class="track">'
          + '<span class="track-pos">' + t.pos + '</span>'
          + '<div class="track-body">'
          + '<div class="track-title">' + t.title + '</div>'
          + (links ? '<div class="track-links">' + links + '</div>' : '')
          + '</div>'
          + (badges ? '<div class="track-badges">' + badges + '</div>' : '')
          + '</div>';
      }).join('');
    }

    function renderShowBlock(show, isCurrent) {
      var poster = show.poster
        ? '<div class="poster-wrap"><img src="' + show.poster + '" alt="' + (show.posterAlt || '') + '" width="280"></div>'
        : '<div class="poster-placeholder" aria-label="' + show.titleText + ' placeholder image">' + show.title + '</div>';

      var badges = (show.badges || []).map(function(b) {
        return '<span class="badge ' + b.cls + '">' + b.label + '</span>';
      }).join('');

      var hostesses = show.hostesses.map(function(h) {
        return '<a href="' + h.url + '" target="_blank" rel="noopener">' + h.name + '</a>';
      }).join(', ');

      var description = (show.description || []).map(function(p) {
        return '<p>' + p + '</p>';
      }).join('');

      var themeTag = show.theme
        ? '<div class="theme-tag">' + (show.themeLabel || 'Theme') + ': <b>' + show.theme + '</b></div>'
        : '';

      var cta = isCurrent
        ? '<div class="cta-row">'
          + '<a class="btn btn-primary" href="https://discord.gg/thepinkroom" target="_blank" rel="noopener">Join on Discord</a>'
          + '<a class="btn btn-ghost" href="https://neuralnetsandprettypatterns.com/deep-drop-party/">Deep Drop Party</a>'
          + '<a class="btn btn-ghost" href="https://neuralnetsandprettypatterns.com/deep-drop-party/episodes/">Episode Archive</a>'
          + '<a class="btn btn-ghost" href="https://neuralnetsandprettypatterns.com/deep-drop-party/faq/">FAQ</a>'
          + '<a class="btn btn-ghost" href="https://www.patreon.com/minderaser" target="_blank" rel="noopener">Patreon</a>'
          + '</div>'
        : '';

      return poster
        + '<div class="ep-kicker"><span class="live-dot" aria-hidden="true"></span>' + show.kicker + '</div>'
        + '<div class="ep-number">Episode ' + show.number + '</div>'
        + '<h1>' + show.title + '</h1>'
        + themeTag
        + '<div class="description">' + description + '</div>'
        + '<div class="badge-row">' + badges + '</div>'
        + '<div class="info-grid">'
        + '<div class="info-cell"><div class="info-label">Episode</div><div class="info-val">' + show.number + '</div></div>'
        + '<div class="info-cell"><div class="info-label">Date</div><div class="info-val">' + show.dateLabel + '</div></div>'
        + '<div class="info-cell"><div class="info-label">Time</div><div class="info-val">9 PM Eastern</div></div>'
        + '<div class="info-cell"><div class="info-label">Where</div><div class="info-val"><a href="https://discord.gg/thepinkroom" target="_blank" rel="noopener">Discord</a></div></div>'
        + '<div class="info-cell"><div class="info-label">Hostesses</div><div class="info-val">' + hostesses + '</div></div>'
        + '<div class="info-cell"><div class="info-label">Entry</div><div class="info-val">Free</div></div>'
        + '</div>'
        + '<p class="section-tag">Tracklist</p>'
        + '<div class="tracklist">' + renderTracklist(show.tracks) + '</div>'
        + cta;
    }

    if (window.DDP && window.DDP.shows && window.DDP.shows.length >= 2) {
      document.getElementById('current-show').innerHTML  = renderShowBlock(window.DDP.shows[0], true);
      document.getElementById('previous-show').innerHTML = renderShowBlock(window.DDP.shows[1], false);
    }
  </script>
